<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Review — TT&T</title>
</head>
<body class="bg-base-300 text-base-content overflow-hidden h-screen">
  <div id="app" class="flex h-screen overflow-hidden">

    <!-- ── 3D Viewport ──────────────────────────────────────────── -->
    <div id="viewport-wrap" class="flex-1 relative overflow-hidden">
      <canvas id="c" class="block w-full h-full"></canvas>

      <div id="loading-overlay"
           class="absolute inset-0 flex items-center justify-center bg-base-300/80 backdrop-blur-sm text-base-content/40 text-sm pointer-events-none transition-opacity duration-300">
        Loading…
      </div>

      <div id="error-banner"
           class="absolute top-0 inset-x-0 bg-error/90 text-error-content text-xs px-3 py-1.5 z-10"
           style="display:none"></div>

      <div id="scale-info"
           class="absolute top-2 left-2 text-[10px] text-base-content/25 pointer-events-none font-mono"></div>

      <div id="nav-bar" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2">
        <button class="btn btn-xs btn-ghost btn-outline opacity-60 hover:opacity-100" id="btn-prev">◄ Prev</button>
        <button class="btn btn-xs btn-ghost btn-outline opacity-60 hover:opacity-100" id="btn-next">Next ►</button>
      </div>
    </div>

    <!-- ── Side Panel ───────────────────────────────────────────── -->
    <div id="side-panel"
         class="w-[300px] flex-shrink-0 bg-base-200 border-l border-base-300 flex flex-col overflow-hidden">

      <!-- Mode tabs -->
      <div id="mode-tabs" class="flex flex-shrink-0 border-b border-base-300">
        <button class="mode-tab active" id="tab-chars"  data-mode="chars">🧙 Characters</button>
        <button class="mode-tab"        id="tab-env"    data-mode="env">🌳 Environment</button>
        <button class="mode-tab"        id="tab-editor" data-mode="editor">✏️ Editor</button>
      </div>

      <!-- ── Characters Panel ─────────────────────────────────── -->
      <div id="chars-panel" class="flex flex-col flex-1 overflow-hidden">

        <!-- Filter bar -->
        <div class="flex items-center gap-1 px-2 py-1.5 border-b border-base-300 flex-shrink-0">
          <input id="filter-inp" type="text" placeholder="filter…"
                 class="input input-xs input-ghost flex-1 text-xs min-w-0 focus:outline-none focus:bg-base-300/50" />
          <div class="flex gap-0.5">
            <button class="role-btn active" data-role="all">All</button>
            <button class="role-btn" data-role="enemy">⚔</button>
            <button class="role-btn" data-role="npc">👥</button>
            <button class="role-btn" data-role="player">🧙</button>
            <button class="role-btn" id="btn-anim-only" title="Animated only">🎬</button>
          </div>
        </div>

        <!-- Model list -->
        <div id="model-list-section" class="flex-1 overflow-y-auto min-h-0">
          <ul id="model-list"></ul>
        </div>

        <!-- Info section -->
        <div id="info-section" class="flex-shrink-0 px-3 py-2 border-t border-base-300 overflow-y-auto max-h-[45%]">
          <div id="model-title" class="text-sm font-semibold text-base-content mb-1 truncate">—</div>
          <div id="stats-grid"></div>
          <div class="section-title">Camera</div>
          <div id="cam-controls" class="flex gap-1 mb-2">
            <button class="cam-btn active" data-angle="front">Front</button>
            <button class="cam-btn" data-angle="side">Side</button>
            <button class="cam-btn" data-angle="iso">Iso</button>
            <button class="cam-btn" data-angle="top">Top</button>
          </div>
          <div class="section-title">Animations</div>
          <div id="anim-controls" class="flex flex-wrap gap-1 mb-1"></div>
        </div>
      </div>

      <!-- ── Environment Panel ─────────────────────────────────── -->
      <div id="env-panel" style="display:none" class="flex flex-col flex-1 overflow-hidden">

        <!-- Search -->
        <div id="env-filter-bar" class="px-2 py-1.5 border-b border-base-300 flex-shrink-0">
          <input id="env-filter-inp" type="text" placeholder="filter assets…"
                 class="input input-xs input-ghost w-full text-xs focus:outline-none focus:bg-base-300/50" />
        </div>

        <!-- Kit tree nav -->
        <div id="env-cat-bar" class="overflow-y-auto flex-shrink-0 border-b border-base-300" style="max-height:42%"></div>

        <!-- Asset list -->
        <div id="env-list-section" class="flex-1 overflow-y-auto min-h-0">
          <ul id="env-list"></ul>
        </div>

        <!-- Asset info -->
        <div id="env-info-section" class="flex-shrink-0 px-3 py-2 border-t border-base-300">
          <div id="env-asset-title" class="text-sm font-semibold text-base-content mb-1 truncate">—</div>
          <div id="env-stats-grid"></div>
          <div class="section-title">Scale</div>
          <div id="env-scale-controls" class="flex items-center gap-2 mb-1">
            <span class="text-[10px] text-base-content/40 shrink-0">Game scale:</span>
            <input id="env-scale-slider" type="range" min="0.1" max="8" step="0.05" value="1"
                   class="range range-xs range-primary flex-1" />
            <span id="env-scale-val" class="font-mono text-xs min-w-[36px] text-right text-primary">1.00</span>
            <button id="env-scale-copy" title="Copy scale value"
                    class="btn btn-xs btn-ghost opacity-50 hover:opacity-100">📋</button>
          </div>
          <label class="flex items-center gap-2 text-[10px] text-base-content/40 mt-1 cursor-pointer">
            <input type="checkbox" id="env-ref-toggle" checked class="checkbox checkbox-xs checkbox-primary" />
            Show 2m reference figure
          </label>
          <div class="section-title">Camera</div>
          <div id="env-cam-controls" class="flex gap-1">
            <button class="cam-btn active" data-angle="front">Front</button>
            <button class="cam-btn" data-angle="side">Side</button>
            <button class="cam-btn" data-angle="iso">Iso</button>
            <button class="cam-btn" data-angle="top">Top</button>
          </div>
        </div>
      </div>

      <!-- ── Editor Panel ──────────────────────────────────────── -->
      <div id="editor-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">

        <!-- Sub-tabs -->
        <div id="editor-sub-tabs" class="flex flex-shrink-0 border-b border-base-300">
          <button class="editor-sub active" data-etype="tower_floor">🏰 Tower</button>
          <button class="editor-sub" data-etype="overworld">🌍 World</button>
          <button class="editor-sub" data-etype="building">🏠 Build</button>
          <button class="editor-sub" data-etype="interior">🪑 Int</button>
          <button class="editor-sub" data-etype="dungeon">⚔️ Dung</button>
        </div>

        <!-- Asset browser: search + kit tree + list -->
        <div id="editor-asset-panel" class="flex flex-col border-b border-base-300" style="flex:1;overflow-y:auto;max-height:55%">
          <input id="editor-asset-search" type="text" placeholder="search assets…"
                 class="input input-xs input-ghost w-full text-xs border-b border-base-300 rounded-none px-2 focus:outline-none focus:bg-base-300/50" />
          <div id="editor-asset-cats" class="overflow-y-auto flex-shrink-0 border-b border-base-300/60" style="max-height:45%"></div>
          <ul id="editor-asset-list" class="flex-1 overflow-y-auto min-h-0"></ul>
        </div>

        <!-- Toolbar -->
        <div id="editor-toolbar"
             class="flex items-center gap-0.5 px-1.5 py-1 bg-base-300/50 border-t border-base-300 flex-wrap flex-shrink-0">
          <div class="join">
            <button class="ed-tool join-item active" id="ed-tool-select" title="Select [V]">↖</button>
            <button class="ed-tool join-item" id="ed-tool-move"   title="Move [W]">✛</button>
            <button class="ed-tool join-item" id="ed-tool-rotate" title="Rotate [E]">↻</button>
            <button class="ed-tool join-item" id="ed-tool-scale"  title="Scale [R]">⤡</button>
          </div>
          <div class="w-px h-4 bg-base-content/10 mx-0.5"></div>
          <div class="join">
            <button class="ed-tool join-item" id="ed-snap-toggle" title="Snap [S]">⊞</button>
            <button class="ed-tool join-item" id="ed-view-top"    title="Top [T]">⊤</button>
            <button class="ed-tool join-item" id="ed-undo"        title="Undo [Ctrl+Z]">↩</button>
            <button class="ed-tool join-item" id="ed-redo"        title="Redo [Ctrl+Y]">↪</button>
          </div>
          <div class="w-px h-4 bg-base-content/10 mx-0.5"></div>
          <div class="join">
            <button class="ed-tool join-item" id="ed-save" title="Save [Ctrl+S]">💾</button>
            <button class="ed-tool join-item" id="ed-load-game" title="Load current saved level from game output">🔄</button>
            <button class="ed-tool join-item" id="ed-load" title="Load from file">📂</button>
          </div>
          <input type="file" id="ed-load-input" accept=".json" style="display:none" />
        </div>

        <!-- Version control panel -->
        <div id="ed-version-panel" class="flex-shrink-0 border-t border-base-300 text-[10px]">
          <div class="flex items-center gap-1 px-2 py-1 bg-base-300/40">
            <span id="ed-doc-label" class="flex-1 text-base-content/50 truncate">—</span>
            <span id="ed-version-count" class="text-base-content/25 font-mono"></span>
            <button id="ed-ver-toggle" class="btn btn-xs btn-ghost opacity-40 hover:opacity-100 text-[9px]" title="Toggle version history">▾ history</button>
          </div>
          <div id="ed-version-save-bar" class="hidden flex items-center gap-1 px-2 py-1 border-t border-base-300/60">
            <input id="ed-version-label" type="text" placeholder="version label…"
                   class="input input-xs input-ghost flex-1 text-[10px] focus:outline-none focus:bg-base-300/50" />
            <button id="ed-version-save" class="btn btn-xs btn-outline btn-primary text-[9px]">+ Save version</button>
          </div>
          <div id="ed-version-list" class="hidden overflow-y-auto" style="max-height:120px"></div>
        </div>

        <!-- Inspector -->
        <div id="editor-inspector" class="px-2 py-1.5 border-t border-base-300 flex-shrink-0 min-h-[60px]">
          <div id="ed-insp-title" class="text-xs text-base-content/40 mb-1">— nothing selected —</div>
          <div id="ed-insp-fields"></div>
        </div>

        <!-- Status bar -->
        <div id="editor-status-bar"
             class="flex gap-2 px-2 py-0.5 bg-base-300/50 border-t border-base-300 text-[9px] text-base-content/30 flex-shrink-0">
          <span id="ed-status-sel">0 selected</span>
          <span id="ed-status-grid">grid: 2 WU</span>
          <span id="ed-status-snap">snap: ON</span>
          <span id="ed-status-undo">0 actions</span>
        </div>
      </div>
    </div><!-- /side-panel -->
  </div><!-- /app -->
  <script type="module" src="/src/model-review.ts"></script>
</body>
</html>
