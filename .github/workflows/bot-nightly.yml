name: Bot Nightly Full Run

on:
  workflow_dispatch:   # manual trigger only

jobs:
  nightly:
    name: Nightly Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Vite dev server
        run: npm run dev -- --port 5174 &
        env:
          NODE_ENV: development

      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5174/ > /dev/null && echo "Server ready" && break
            echo "Waiting… ($i/30)"
            sleep 2
          done

      - name: new-game-flow
        run: npm run bot:ci -- --scenario new-game-flow --record

      - name: quest-chain
        run: npm run bot:ci -- --scenario quest-chain --record
        continue-on-error: true

      - name: explore-floor
        run: npm run bot:ci -- --scenario explore-floor --record
        continue-on-error: true

      - name: creative-smoke
        run: npm run bot:ci -- --scenario creative-smoke --record

      - name: Screenshot diff against baseline
        run: node tests/bot/screenshotDiff.mjs
        continue-on-error: true   # diff failures are informational only

      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-${{ github.run_number }}
          path: |
            tests/bot/reports/*.html
            tests/bot/screenshots/**/*.png
            tests/bot/diff/**/*.png
          retention-days: 30

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-videos-${{ github.run_number }}
          path: tests/bot/videos/*.webm
          retention-days: 14
