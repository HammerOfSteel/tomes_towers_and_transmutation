<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overworld Studio — TT&T</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0e12;
      --panel:   #161820;
      --border:  #2a2d3a;
      --accent:  #7c6af5;
      --text:    #c8cad8;
      --muted:   #5a5e72;
      --gold:    #f5c842;
      --green:   #52d98c;
      --red:     #e05c5c;
      --font:    'Segoe UI', system-ui, sans-serif;
      --mono:    'Fira Mono', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    header .sep { color: var(--border); }

    .seed-row { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .seed-row label { color: var(--muted); font-size: 11px; }
    #seed-input {
      width: 100px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 3px 7px; border-radius: 4px; font-family: var(--mono); font-size: 11px;
    }
    .btn {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      transition: border-color .15s, color .15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { opacity: .85; }

    /* ── Main layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Canvas area ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0a0b0e;
    }
    #map-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      cursor: default;
    }
    #map-canvas.tool-warp { cursor: crosshair; }
    #map-canvas.tool-warp.dragging { cursor: grabbing; }
    #overlay-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Floating map toolbar ── */
    .map-toolbar {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      display: flex; gap: 4px;
    }
    .tool-btn {
      width: 32px; height: 32px; border-radius: 6px;
      background: rgba(22,24,32,0.92); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: .12s; backdrop-filter: blur(4px);
    }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gen-time {
      position: absolute; bottom: 8px; left: 12px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      pointer-events: none;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .section {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }

    /* ── Type pills ── */
    .pill-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .pill {
      padding: 3px 8px; border-radius: 12px; cursor: pointer; font-size: 11px;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      transition: .12s;
    }
    .pill:hover { border-color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Sliders ── */
    .slider-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    input[type=range] {
      width: 100%; accent-color: var(--accent); height: 14px;
    }

    /* ── Ward legend ── */
    .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 11px; }
    .swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    /* ── Status bar ── */
    footer {
      padding: 4px 12px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }
    footer span { font-family: var(--mono); }
    .status-key { color: var(--border); }
  </style>
</head>
<body>
  <header>
    <h1>⬡ OVERWORLD STUDIO</h1>
    <span class="sep">|</span>
    <span style="color:var(--muted);font-size:11px">TT&T Settlement Generator</span>
    <div class="seed-row">
      <label>SEED</label>
      <input id="seed-input" type="text" value="445176186" />
      <button class="btn" id="btn-roll" title="New random seed [Space]">🎲</button>
      <button class="btn primary" id="btn-gen" title="Regenerate [Enter]">Generate</button>
    </div>
  </header>

  <div class="workspace">
    <div class="canvas-wrap">
      <div class="map-toolbar">
        <button class="tool-btn active" id="tool-select" title="Select [S] — hover to inspect wards">⬡</button>
        <button class="tool-btn"        id="tool-warp"   title="Warp [D] — drag to push/pull settlement">⊹</button>
        <button class="tool-btn"        id="tool-reset"  title="Reset warp [R] — restore current seed">↺</button>
        <div style="width:1px;background:var(--border);margin:4px 2px"></div>
        <button class="tool-btn active" id="view-flat"   title="Flat map view [1]">▦</button>
        <button class="tool-btn"        id="view-iso"    title="2.5D isometric view [2]">◫</button>
      </div>
      <canvas id="map-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div class="gen-time" id="gen-time">—</div>
    </div>

    <aside class="sidebar">
      <div class="section">
        <div class="section-title">Settlement Type</div>
        <div class="pill-row" id="type-pills">
          <button class="pill active" data-type="village">Village</button>
          <button class="pill" data-type="town">Town</button>
          <button class="pill" data-type="city">City</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Size</div>
        <div class="slider-row">
          <div class="slider-label"><span>Patches</span><span id="patches-val">12</span></div>
          <input type="range" id="patches" min="4" max="40" value="12" />
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Warp</span><span id="warp-val">0.3</span></div>
          <input type="range" id="warp" min="0" max="1" step="0.05" value="0.3" />
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Roads</span><span id="roads-val">3</span></div>
          <input type="range" id="roads" min="1" max="6" value="3" />
        </div>
      </div>

      <div class="section">
        <div class="section-title">Features</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
            <input type="checkbox" id="walls" /> Walls &amp; gates
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
            <input type="checkbox" id="citadel" /> Citadel
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
            <input type="checkbox" id="plaza" checked /> Market plaza
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
            <input type="checkbox" id="show-labels" checked /> Labels
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
            <input type="checkbox" id="show-buildings" checked /> Buildings
          </label>
        </div>
      </div>

      <div class="section" style="flex:1">
        <div class="section-title">Ward Legend</div>
        <div id="ward-legend"></div>
      </div>

      <div class="section">
        <div class="section-title">Export</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="btn" id="btn-png" style="width:100%">📷 PNG</button>
          <button class="btn" id="btn-json" style="width:100%">📋 JSON</button>
        </div>
      </div>
    </aside>
  </div>

  <footer>
    <span><span class="status-key">Space</span> new seed</span>
    <span><span class="status-key">Enter</span> regenerate</span>
    <span><span class="status-key">+/−</span> patches</span>
    <span><span class="status-key">S</span> select &nbsp;<span class="status-key">D</span> warp &nbsp;<span class="status-key">R</span> reset &nbsp;<span class="status-key">1</span> flat &nbsp;<span class="status-key">2</span> 2.5D</span>
    <span id="hover-info">hover a ward to inspect</span>
  </footer>

  <script type="module" src="/src/overworld-studio.ts"></script>
</body>
</html>
