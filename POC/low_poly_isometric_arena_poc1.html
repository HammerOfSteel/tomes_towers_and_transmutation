<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Poly Circular Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* UI Styling mimicking the reference */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d1d5db;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hp-bar-container {
            width: 150px;
            height: 6px;
            background-color: #374151;
            border-radius: 4px;
            margin-top: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background-color: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
        }
        .stamina-dots {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #0ea5e9;
        }
        .skill-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .skill-slot {
            width: 60px;
            height: 60px;
            background-color: rgba(17, 24, 39, 0.8);
            border: 1px solid #374151;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 10px;
        }
        .skill-slot.active {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            color: #e5e7eb;
        }
        .skill-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #3b82f6;
            margin-bottom: 4px;
            box-shadow: 0 0 10px #3b82f6;
        }
        .story-box {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background-color: rgba(17, 24, 39, 0.9);
            border-left: 2px solid #fbbf24;
            padding: 16px;
            color: #9ca3af;
            font-size: 12px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        .story-title {
            color: #fbbf24;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- WebGL Canvas Container -->
    <div id="canvas-container"></div>

    <!-- HTML UI Overlay matching reference image -->
    <div class="ui-layer">
        <div class="hud-top-left">
            <div class="flex justify-between w-[150px]">
                <span>Lv 1</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-[10px]">HP</span>
                <div class="hp-bar-container">
                    <div class="hp-bar-fill"></div>
                </div>
                <span class="text-[10px]">10 / 10</span>
            </div>
            <div class="flex items-center gap-2 mb-2">
                <div class="stamina-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <span class="bg-gray-800 px-1 py-0.5 rounded text-[10px] text-gray-400">SHIFT SPRINT</span>
            </div>
            <div class="text-[10px] text-gray-500">
                0 / 0 foes<br>
                ▲ The Grand Entrance Hall
            </div>
        </div>

        <div class="skill-bar">
            <div class="skill-slot active">
                <div class="text-[10px] absolute top-1 right-1 text-gray-400">1</div>
                <div class="skill-icon"></div>
                <span>Magic Bolt</span>
            </div>
            <div class="skill-slot">
                <div class="text-[10px] absolute top-1 right-1 text-gray-600">2</div>
                <span>-- empty --</span>
            </div>
            <div class="skill-slot">
                <div class="text-[10px] absolute top-1 right-1 text-gray-600">3</div>
                <span>-- empty --</span>
            </div>
            <div class="skill-slot">
                <div class="text-[10px] absolute top-1 right-1 text-gray-600">4</div>
                <span>-- empty --</span>
            </div>
        </div>

        <div class="story-box">
            <div class="text-[9px] uppercase tracking-widest text-gray-500 mb-1">Story Objective</div>
            <div class="story-title">Map the Territory</div>
            <p class="italic">A Vulperta does not panic. A Vulperta assesses. The ground floor is your starting point. Find the exit...</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

        // --- Core Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3a4b5c); // Soft hazy blue sky
        scene.fog = new THREE.FogExp2(0x3a4b5c, 0.015); // Adds depth fading

        // --- Camera Setup (Isometric/Tilt-shift style) ---
        // Using a narrow FOV and pulling the camera back simulates orthographic/isometric 
        // while retaining perspective depth for the Bokeh (blur) pass to work well.
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Post Processing (The Miniature Effect)
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bokehPass = new BokehPass(scene, camera, {
            focus: 40.0,      // Focus distance (will update dynamically to follow player)
            aperture: 0.0002,  // How aggressive the blur is
            maxblur: 0.01,    // Maximum blur radius
            width: window.innerWidth,
            height: window.innerHeight
        });
        composer.addPass(bokehPass);


        // 1. GENERATE GRID TEXTURE CODE-FIRST
        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');

            // Base color
            context.fillStyle = '#2d2f33'; 
            context.fillRect(0, 0, 512, 512);

            // Grid lines
            context.strokeStyle = '#1e1f22';
            context.lineWidth = 4;
            
            // Draw grid
            for (let i = 0; i <= 512; i += 128) {
                context.beginPath();
                context.moveTo(i, 0);
                context.lineTo(i, 512);
                context.stroke();
                
                context.beginPath();
                context.moveTo(0, i);
                context.lineTo(512, i);
                context.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10); // Scale the grid on the floor
            // texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        // Arena configuration
        const ARENA_RADIUS = 25;
        const WALL_THICKNESS = 6;
        const WALL_HEIGHT = 6;

        // --- Build Floor ---
        const floorGeo = new THREE.CircleGeometry(ARENA_RADIUS, 64);
        const floorMat = new THREE.MeshStandardMaterial({ 
            map: createGridTexture(),
            roughness: 0.8,
            metalness: 0.1
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);


        // --- Build Procedural Rocky Wall ---
        // Create a 2D shape of a ring, then extrude it up
        const wallShape = new THREE.Shape();
        wallShape.absarc(0, 0, ARENA_RADIUS + WALL_THICKNESS, 0, Math.PI * 2, false);
        
        const wallHole = new THREE.Path();
        wallHole.absarc(0, 0, ARENA_RADIUS, 0, Math.PI * 2, true);
        wallShape.holes.push(wallHole);

        const extrudeSettings = {
            depth: WALL_HEIGHT,
            bevelEnabled: true,
            bevelSegments: 1,
            steps: 1,
            bevelSize: 0.5,
            bevelThickness: 0.5,
            curveSegments: 24 // Keep low for "low poly" look
        };

        let wallGeo = new THREE.ExtrudeGeometry(wallShape, extrudeSettings);
        // Convert to non-indexed to give each triangle its own vertices for true flat shading & displacement
        wallGeo = wallGeo.toNonIndexed(); 
        
        // Jitter vertices to create rocky, low-poly faceted look
        const positions = wallGeo.attributes.position;
        for (let i = 0; i < positions.count; i++) {
            const z = positions.getZ(i); // Note: ExtrudeGeo extrudes along Z, so Z is height
            
            // Only jitter vertices that are not perfectly at the bottom (z=0)
            if (z > 0.1) {
                positions.setX(i, positions.getX(i) + (Math.random() - 0.5) * 0.8);
                positions.setY(i, positions.getY(i) + (Math.random() - 0.5) * 0.8);
                positions.setZ(i, positions.getZ(i) + (Math.random() - 0.5) * 0.5);
            }
        }
        wallGeo.computeVertexNormals(); // Recompute lighting normals after jitter

        const wallMat = new THREE.MeshStandardMaterial({ 
            color: 0x7c756a, // Earthy stone grey/brown
            flatShading: true,
            roughness: 0.9 
        });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.rotation.x = -Math.PI / 2; // Flip it to stand up
        wall.position.y = 0;
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);


        // --- Grass Top Rim ---
        const grassRimGeo = new THREE.RingGeometry(ARENA_RADIUS + 0.2, ARENA_RADIUS + WALL_THICKNESS - 0.2, 48);
        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0x5a7d4a, 
            roughness: 1.0, 
            flatShading: true 
        });
        const grassRim = new THREE.Mesh(grassRimGeo, grassMat);
        grassRim.rotation.x = -Math.PI / 2;
        grassRim.position.y = WALL_HEIGHT + 0.55; // Sit right on top of wall
        grassRim.receiveShadow = true;
        scene.add(grassRim);

        // --- Polar Scatter: Bushes & Rocks ---
        function addScatterDecorations() {
            const decGroup = new THREE.Group();
            
            // Low-poly geometry types
            const bushGeo = new THREE.IcosahedronGeometry(0.8, 0); // Very low poly sphere
            const rockGeo = new THREE.DodecahedronGeometry(0.6, 0);
            const bushMat = new THREE.MeshStandardMaterial({ color: 0x4a6d3a, flatShading: true });
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x888c8d, flatShading: true });

            const itemCount = 120; // Number of props around the ring
            
            for (let i = 0; i < itemCount; i++) {
                // 1. Pick Random Angle
                const angle = Math.random() * Math.PI * 2;
                // 2. Pick Random Radius between inner and outer wall limits
                const r = ARENA_RADIUS + 0.8 + Math.random() * (WALL_THICKNESS - 1.6);
                
                // 3. Convert Polar to Cartesian
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;

                const isBush = Math.random() > 0.4;
                const mesh = new THREE.Mesh(isBush ? bushGeo : rockGeo, isBush ? bushMat : rockMat);
                
                mesh.position.set(x, WALL_HEIGHT + 0.6 + Math.random() * 0.2, z);
                
                // 4. Randomize transforms for organic feel
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                const scale = 0.5 + Math.random() * 1.5;
                mesh.scale.set(scale, scale, scale);
                
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                decGroup.add(mesh);
            }
            scene.add(decGroup);
        }
        addScatterDecorations();


        // --- Pillars & Local Lights ---
        const pillarGeo = new THREE.CylinderGeometry(0.4, 0.5, 4, 6); // 6 sides = low poly
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x5a554a, flatShading: true });
        
        // Place 4 pillars in a square arrangement inside the circle
        const pillarRadius = 12;
        for (let i = 0; i < 4; i++) {
            const angle = (Math.PI / 2) * i + (Math.PI / 4);
            const x = Math.cos(angle) * pillarRadius;
            const z = Math.sin(angle) * pillarRadius;

            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(x, 2, z);
            pillar.castShadow = true;
            pillar.receiveShadow = true;
            scene.add(pillar);

            // Add a "torch" light above each pillar
            const torchLight = new THREE.PointLight(0xffa95c, 50, 15);
            torchLight.position.set(x, 4.5, z);
            scene.add(torchLight);

            // Small glowing orb to represent the fire
            const fireGeo = new THREE.OctahedronGeometry(0.2, 0);
            const fireMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            const fire = new THREE.Mesh(fireGeo, fireMat);
            fire.position.set(x, 4.2, z);
            scene.add(fire);
        }

        // --- Center Rug ---
        const rugGeo = new THREE.PlaneGeometry(6, 6);
        const rugMat = new THREE.MeshStandardMaterial({ color: 0x8b3a3a }); // Red rug
        const rug = new THREE.Mesh(rugGeo, rugMat);
        rug.rotation.x = -Math.PI / 2;
        rug.position.y = 0.02; // Slightly above floor to avoid Z-fighting
        rug.receiveShadow = true;
        scene.add(rug);
        
        // Rug yellow trim (using simple planes)
        const trimGeo = new THREE.PlaneGeometry(6.4, 6.4);
        const trimMat = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
        const trim = new THREE.Mesh(trimGeo, trimMat);
        trim.rotation.x = -Math.PI / 2;
        trim.position.y = 0.01;
        trim.receiveShadow = true;
        scene.add(trim);


        // --- Environment Lighting ---
        // Soft ambient to lighten shadows, slightly bluish for atmosphere
        const ambientLight = new THREE.AmbientLight(0x405060, 1.5);
        scene.add(ambientLight);

        // Main directional sun mimicking late afternoon/dusk
        const sunLight = new THREE.DirectionalLight(0xffedd6, 2.5);
        sunLight.position.set(-20, 30, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 100;
        const d = 30;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);


        // --- Player Character (Placeholder Low Poly Hero) ---
        const playerGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.3, 0.5, 1.2, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc4422, flatShading: true }); // Red tunic
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        playerGroup.add(body);

        // Head (fox/goblin-like per reference)
        const headGeo = new THREE.OctahedronGeometry(0.4, 1);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x228833, flatShading: true }); // Green hood/head
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.4;
        head.castShadow = true;
        playerGroup.add(head);

        playerGroup.position.set(0, 0, 5); // Start slightly off center
        scene.add(playerGroup);


        // --- Input & Physics State ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        const moveSpeed = 8.0;

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // --- Particle System (Magic Dust) ---
        const particleCount = 200;
        const particlesGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        
        for(let i=0; i<particleCount*3; i+=3) {
            particlePos[i] = (Math.random() - 0.5) * ARENA_RADIUS * 1.5;
            particlePos[i+1] = Math.random() * 5; // Height
            particlePos[i+2] = (Math.random() - 0.5) * ARENA_RADIUS * 1.5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.4 });
        const particleSystem = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleSystem);


        // --- Camera & Animation Loop ---
        const clock = new THREE.Clock();

        // Isometric offset logic
        const camOffset = new THREE.Vector3(25, 30, 25); 

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // 1. Move Player
            const velocity = new THREE.Vector3(0, 0, 0);
            if (keys.w || keys.ArrowUp) velocity.z -= 1;
            if (keys.s || keys.ArrowDown) velocity.z += 1;
            if (keys.a || keys.ArrowLeft) velocity.x -= 1;
            if (keys.d || keys.ArrowRight) velocity.x += 1;
            
            if (velocity.length() > 0) {
                velocity.normalize();
                
                // Rotate player to face movement direction
                const targetRotation = Math.atan2(velocity.x, velocity.z);
                playerGroup.rotation.y = targetRotation;

                playerGroup.position.add(velocity.multiplyScalar(moveSpeed * dt));
            }

            // 2. MATHEMATICAL COLLISION (The Code-First Trick)
            // Check distance from center. If > allowed radius, clamp position.
            const distFromCenter = Math.sqrt(playerGroup.position.x ** 2 + playerGroup.position.z ** 2);
            const maxAllowedRadius = ARENA_RADIUS - 1.0; // 1 unit buffer for character width
            if (distFromCenter > maxAllowedRadius) {
                const angle = Math.atan2(playerGroup.position.z, playerGroup.position.x);
                playerGroup.position.x = Math.cos(angle) * maxAllowedRadius;
                playerGroup.position.z = Math.sin(angle) * maxAllowedRadius;
            }

            // 3. Update Camera Position (Follow Player with smoothing)
            const targetCamPos = playerGroup.position.clone().add(camOffset);
            camera.position.lerp(targetCamPos, 0.1); 
            camera.lookAt(playerGroup.position.x, 0, playerGroup.position.z);

            // 4. Update Bokeh focus distance based on camera distance to player
            const distToTarget = camera.position.distanceTo(playerGroup.position);
            bokehPass.uniforms['focus'].value = distToTarget;

            // 5. Animate Particles
            const positions = particleSystem.geometry.attributes.position.array;
            for(let i=1; i<particleCount*3; i+=3) {
                positions[i] += dt * 0.5; // Float up
                if (positions[i] > 6) {
                    positions[i] = 0; // Reset height
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            // Render using the composer (Post-Processing) instead of standard renderer
            composer.render();
        }

        // Handle Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        animate();
    </script>
</body>
</html>
