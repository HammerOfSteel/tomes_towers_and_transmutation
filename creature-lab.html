<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Creature Lab — Geometry Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0b18; overflow: hidden; font-family: monospace; }
    #lab-canvas { display: block; width: 100vw; height: 100vh; }

    /* HUD overlay */
    #hud {
      position: fixed; top: 8px; left: 8px;
      color: #ffe8d0; font-size: 11px; pointer-events: none;
      display: flex; flex-direction: column; gap: 3px;
    }
    .hud-line {
      background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 2px;
    }

    /* Archetype labels across the bottom */
    #arch-labels {
      position: fixed; bottom: 12px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 0; pointer-events: none;
    }
    .arch-label {
      color: #ffe8d0; font-size: 12px; text-align: center;
      background: rgba(0,0,0,0.65); padding: 3px 10px; border-radius: 2px;
      min-width: 110px;
    }

    /* Test mode label */
    #mode-label {
      position: fixed; top: 8px; right: 8px;
      background: rgba(80,40,160,0.7); color: #ffe8d0;
      font-size: 11px; padding: 3px 10px; border-radius: 3px;
    }
  </style>
</head>
<body>
  <canvas id="lab-canvas"></canvas>

  <div id="hud">
    <div class="hud-line">Y-ruler: <span style="color:#ff5555">■</span> y=0 ground &nbsp; <span style="color:#55ff55">■</span> y=1 &nbsp; <span style="color:#ffff55">■</span> y=2</div>
    <div class="hud-line">Grid: 1 unit per square &nbsp;|&nbsp; All creatures at same scale</div>
    <div class="hud-line" id="hud-state">State: idle</div>
    <div class="hud-line" id="hud-angle">Angle: 0°</div>
  </div>

  <div id="arch-labels"></div>
  <div id="mode-label" id="mode-label">All archetypes</div>

  <script type="module" src="/src/creature-lab.ts"></script>
</body>
</html>
