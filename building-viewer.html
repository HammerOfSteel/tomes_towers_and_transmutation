<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Building Viewer — TT&amp;T</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0808; overflow:hidden; }
    #bv-canvas { display:block; width:100vw; height:100vh; }
    #bv-status {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      color:#c8a96e; font-family:'IM Fell English',Georgia,serif;
      font-size:1.1rem; text-align:center; line-height:1.8;
      display:none; padding:2rem; background:rgba(10,8,8,0.85);
      border:1px solid #4a3828; border-radius:4px;
    }
    #bv-room-name {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
      color:#9a8870; font-family:'IM Fell English',Georgia,serif;
      font-size:0.85rem; letter-spacing:0.1em; opacity:0.8; pointer-events:none;
    }
  </style>
</head>
<body>
  <canvas id="bv-canvas"></canvas>
  <div id="bv-status"></div>
  <div id="bv-room-name"></div>
  <script type="module" src="/src/building-viewer.ts"></script>
</body>
</html>
